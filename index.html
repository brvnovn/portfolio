</head>

        <h1 class="name">Bruno<br />Vieira</h1>
      </div>

      <div class="bio bio--a">
        <p>Designer Gráfico pela Uni. Federal de Goiás (UFG)</p>
        <p class="bio-link">
          <a href="https://drive.google.com/file/d/1xYx-Jv2nFxoQ1z5mNhCMlOxwZ0Tf17GZ/view?usp=sharing" target="_blank" rel="noopener" aria-label="Ver currículo completo">
            <span aria-hidden="true">&#8618;</span> Currículo Completo
          </a>
        </p>
      </div>

      <div class="bio bio--b">
        <p>Atuo há 5 anos em múltiplos papéis no ecossistema de design.</p>
        <p>Experiência em branding, campanhas/SM e finalização.</p>
        <p class="bio-links">
          <a href="https://www.linkedin.com/in/brvnovn/" target="_blank" rel="noopener">LinkedIn</a>
          <a href="https://wa.me/5517981207066" target="_blank" rel="noopener">WhatsApp</a>
          <a href="mailto:brvnovn@gmail.com">Email</a>
        </p>
      </div>
    </header>

    <!-- ============ CARROSSEL ============ -->
    <main>
      <section class="carousel" id="cases" aria-roledescription="carrossel" aria-label="Projetos de design">
        <div class="carousel__controls">
          <button class="carousel__arrow carousel__arrow--prev" id="prev" type="button" aria-label="Projeto anterior">
            <span aria-hidden="true">&#8592;</span>
          </button>
          <button class="carousel__arrow carousel__arrow--next" id="next" type="button" aria-label="Próximo projeto">
            <span aria-hidden="true">&#8594;</span>
          </button>
        </div>
        <div class="carousel__viewport">
          <ul class="carousel__track" id="track">
            <!-- itens injetados via JS -->
          </ul>
        </div>
      </section>
    </main>
  </div>

  <!-- ============ OVERLAY ============ -->
  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-label="Projeto ampliado" hidden>
    <button class="overlay__close" id="overlayClose" type="button" aria-label="Fechar">
      <span aria-hidden="true">&times;</span>
    </button>
    <button class="overlay__nav overlay__nav--prev" id="overlayPrev" type="button" aria-label="Imagem anterior" hidden>
      <span aria-hidden="true">&#8592;</span>
    </button>
    <button class="overlay__nav overlay__nav--next" id="overlayNext" type="button" aria-label="Próxima imagem" hidden>
      <span aria-hidden="true">&#8594;</span>
    </button>
    <figure class="overlay__figure">
      <div class="overlay__media" id="overlayMedia"></div>
      <figcaption class="overlay__caption">
        <span id="overlayCaption"></span>
        <span class="overlay__count" id="overlayCount" hidden></span>
      </figcaption>
    </figure>
  </div>

  <!-- ============ OVERLAY — MOSAICO (formato novo, para peças de social media) ============ -->
  <div class="mosaic" id="overlayMosaic" role="dialog" aria-modal="true" aria-label="Mosaico do projeto" tabindex="-1" hidden>
    <header class="mosaic__header">
      <button class="mosaic__close" id="mosaicClose" type="button" aria-label="Fechar">
        <span aria-hidden="true">&times;</span>
      </button>
    </header>

    <div class="mosaic__scroll">
      <ul class="mosaic__grid" id="mosaicGrid"></ul>
    </div>

    <!-- visualização ampliada de uma peça do mosaico -->
    <div class="mosaic__zoom" id="mosaicZoom" hidden>
      <button class="overlay__close" id="mosaicZoomClose" type="button" aria-label="Sair">
        <span aria-hidden="true">&times;</span>
      </button>
      <button class="overlay__nav overlay__nav--prev" id="mosaicZoomPrev" type="button" aria-label="Peça anterior">
        <span aria-hidden="true">&#8592;</span>
      </button>
      <button class="overlay__nav overlay__nav--next" id="mosaicZoomNext" type="button" aria-label="Próxima peça">
        <span aria-hidden="true">&#8594;</span>
      </button>
      <figure class="overlay__figure">
        <div class="overlay__media" id="mosaicZoomMedia"></div>
        <figcaption class="overlay__caption overlay__caption--center">
          <span class="overlay__count" id="mosaicZoomCount"></span>
        </figcaption>
      </figure>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
